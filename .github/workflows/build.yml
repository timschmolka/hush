name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build driver
        run: make build

      - name: Verify bundle
        run: |
          BIN=Hush.driver/Contents/MacOS/Hush
          test -f "$BIN"
          otool -hv "$BIN" | grep -q BUNDLE
          nm -gU "$BIN" | grep -q _HushCreate
          lipo -info "$BIN"
          codesign --verify --verbose Hush.driver

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hush.driver
          path: Hush.driver
