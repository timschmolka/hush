name: Release

# Cut a signed + notarized installer whenever a version tag is pushed.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub release

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # Rebuild a disposable keychain from the exported Developer ID certs.
      - name: Import signing certificates
        env:
          APP_CERT_P12_BASE64:       ${{ secrets.DEVELOPER_ID_APP_CERT_P12_BASE64 }}
          INSTALLER_CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_INSTALLER_CERT_P12_BASE64 }}
          CERT_P12_PASSWORD:         ${{ secrets.CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD:         ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          echo "$APP_CERT_P12_BASE64"       | base64 --decode > "$RUNNER_TEMP/app.p12"
          echo "$INSTALLER_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/installer.p12"
          security import "$RUNNER_TEMP/app.p12"       -k "$KEYCHAIN" -P "$CERT_P12_PASSWORD" -T /usr/bin/codesign
          security import "$RUNNER_TEMP/installer.p12" -k "$KEYCHAIN" -P "$CERT_P12_PASSWORD" -T /usr/bin/pkgbuild
          rm -f "$RUNNER_TEMP/app.p12" "$RUNNER_TEMP/installer.p12"

          # Make the new keychain visible to the tools and allow non-interactive access.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      # sign-release + pkg + notarize + staple, authenticating with an
      # Apple ID + app-specific password (same credential type as the local
      # notarytool-profile).
      - name: Build, sign, package, and notarize
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID:  ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          make dist NOTARY_ARGS="--apple-id $NOTARY_APPLE_ID --password $NOTARY_PASSWORD --team-id $NOTARY_TEAM_ID"

      - name: Verify the notarized package
        run: |
          spctl -a -vvv -t install Hush-*.pkg
          shasum -a 256 Hush-*.pkg | tee SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Hush-*.pkg
            SHA256SUMS.txt
          body_path: SHA256SUMS.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
