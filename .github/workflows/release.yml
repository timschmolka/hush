name: Release

# Cut a signed + notarized installer whenever a version tag is pushed.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub release

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # Rebuild a disposable keychain from the exported Developer ID certs.
      # A single .p12 carries both identities (Application + Installer).
      - name: Import signing certificates
        env:
          CERTS_P12_BASE64:  ${{ secrets.DEVELOPER_ID_CERTS_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          echo "$CERTS_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certs.p12"
          security import "$RUNNER_TEMP/certs.p12" -k "$KEYCHAIN" -P "$CERT_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/pkgbuild
          rm -f "$RUNNER_TEMP/certs.p12"

          # Make the new keychain visible to the tools and allow non-interactive access.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Write notary API key
        env:
          NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_API_KEY_P8_BASE64 }}
        run: echo "$NOTARY_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/notary.p8"

      # sign-release + pkg + notarize + staple, authenticating via the
      # App Store Connect API team key.
      - name: Build, sign, package, and notarize
        env:
          NOTARY_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.NOTARY_API_ISSUER_ID }}
        run: |
          make dist NOTARY_ARGS="--key $RUNNER_TEMP/notary.p8 --key-id $NOTARY_KEY_ID --issuer $NOTARY_ISSUER"

      - name: Verify the notarized package and write release notes
        run: |
          set -euo pipefail
          spctl -a -vvv -t install Hush-*.pkg
          PKG=$(ls Hush-*.pkg)
          shasum -a 256 "$PKG" > SHA256SUMS.txt
          SHA=$(awk '{print $1}' SHA256SUMS.txt)
          sed -e "s|__PKG__|$PKG|g" -e "s|__SHA__|$SHA|g" \
            packaging/release-notes.md.tmpl > RELEASE_NOTES.md

      # Only publish on a real version tag. A manual workflow_dispatch run does
      # everything above (a full sign + notarize dry run) but skips this.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Hush-*.pkg
            SHA256SUMS.txt
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up notary key
        if: always()
        run: rm -f "$RUNNER_TEMP/notary.p8"
